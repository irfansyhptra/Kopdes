<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Flagpole -->
  <line x1="100" y1="-10" x2="100" y2="20" stroke="#FF385C" stroke-width="5" stroke-linecap="round"/>

  <!-- Roof outline (drawn left -> apex -> right) -->
  <path d="M20,100 L100,20 L180,100" fill="none" stroke="#FF385C" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Walls -->
  <path d="M40,100 L40,180 L160,180 L160,100" fill="none" stroke="#FF385C" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Door / window cut-out -->
  <path d="M85,180 L85,140 L115,140 L115,180" fill="none" stroke="#FF385C" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small window squares -->
  <rect x="52" y="150" width="10" height="10" fill="#FF385C"/>
  <rect x="52" y="166" width="10" height="10" fill="#FF385C"/>

  <!-- Wordmark (static reference, real animation is done with Flutter widgets) -->
  <text x="100" y="205" font-family="Helvetica, Arial, sans-serif" font-size="14"
        font-weight="600" fill="#111111" text-anchor="middle">MERAH PUTIH</text>
</svg>
